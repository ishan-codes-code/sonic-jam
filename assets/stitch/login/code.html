<body class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center overflow-x-hidden selection:bg-primary selection:text-on-primary">
<!-- Atmospheric Background Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="bg-mesh absolute inset-0"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 blur-[120px] rounded-full"></div>
</div>
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center h-20 px-6 w-full bg-transparent">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-purple-400 dark:text-purple-300" style="font-size: 28px;">music_note</span>
<span class="text-2xl font-black bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent font-headline tracking-tighter">SONICJAM</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-md px-6 py-24 flex flex-col items-center">
<!-- Hero Section -->
<section class="text-center mb-10 w-full">
<h1 class="font-headline font-bold text-4xl lg:text-5xl tracking-tight mb-3 text-on-surface">
                Welcome Back
            </h1>
<p class="text-on-surface-variant font-medium tracking-wide">
                Sign in to continue your sonic journey
            </p>
</section>
<!-- Glassmorphic Login Card -->
<div class="glass-card w-full rounded-xl p-8 border border-white/5 shadow-2xl relative overflow-hidden">
<!-- Subtle Inner Glow -->
<div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-4">Email Address</label>
<div class="group neon-glow rounded-full bg-surface-container-high transition-all duration-300 border border-transparent focus-within:border-secondary/30">
<div class="flex items-center px-5 py-4">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary transition-colors mr-3">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline p-0 text-sm font-medium" placeholder="name@email.com" type="email"/>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-4">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant">Password</label>
</div>
<div class="group neon-glow rounded-full bg-surface-container-high transition-all duration-300 border border-transparent focus-within:border-secondary/30">
<div class="flex items-center px-5 py-4">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-secondary transition-colors mr-3">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface placeholder:text-outline p-0 text-sm font-medium" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined text-on-surface-variant hover:text-on-surface cursor-pointer ml-2">visibility</span>
</div>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end pr-2">
<a class="text-xs font-bold text-on-surface-variant hover:text-primary transition-colors uppercase tracking-wider" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-secondary text-on-primary-container font-headline font-extrabold text-sm uppercase tracking-widest shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                    Login
                </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-[0.2em] text-outline">or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Login -->
<div class="flex justify-center gap-4">
<button class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-surface-bright transition-colors border border-white/5" type="button">
<svg class="w-6 h-6 fill-on-surface" viewbox="0 0 24 24">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"></path>
</svg>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-highest flex items-center justify-center hover:bg-surface-bright transition-colors border border-white/5" type="button">
<svg class="w-6 h-6 fill-on-surface" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.12 1.43-3.48 1.43-1.12 0-2.12-.34-2.99-1.03-.87-.69-1.74-1.03-2.6-1.03-.86 0-1.66.31-2.42.94-.76.63-1.6 1.03-2.52 1.03-1.36 0-2.52-.48-3.48-1.43C-.42 18.29-1.16 14.8-1.16 11.23c0-3.32.74-6.32 2.22-9s3.52-4.22 6.13-4.22c1.12 0 2.15.34 3.09 1.02.94.68 1.83 1.02 2.67 1.02.84 0 1.76-.34 2.76-1.02C16.71.35 17.82.01 19.04.01c2.25 0 4.13 1.1 5.62 3.31l.09.13-4.14 2.44c-1.33-1.76-2.92-2.64-4.75-2.64-.67 0-1.31.14-1.92.42-1.22.56-1.83 1.47-1.83 2.72 0 1.39.75 2.37 2.25 2.94 1.25.48 2.6.72 4.05.72h.43c0 2.8-.57 5.25-1.71 7.33-.76 1.38-1.78 2.33-3.07 2.84z" transform="translate(1 0.5)"></path>
</svg>
</button>
</div>
</form>
</div>
<!-- Footer Action -->
<div class="mt-8 text-center">
<p class="text-sm font-medium text-on-surface-variant">
                Don’t have an account? 
                <a class="ml-1 font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent hover:opacity-80 transition-opacity" href="#">
                    Create Account
                </a>
</p>
</div>
</main>
