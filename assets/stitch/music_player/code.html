<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#ba88ff",
              "secondary-container": "#006875",
              "outline": "#757575",
              "secondary-dim": "#00d4ec",
              "surface-container": "#191919",
              "on-background": "#ffffff",
              "on-secondary-fixed-variant": "#005964",
              "on-secondary": "#004d57",
              "on-tertiary-fixed": "#39000e",
              "surface-dim": "#0e0e0e",
              "on-primary-fixed-variant": "#3f007c",
              "tertiary-dim": "#f47788",
              "on-tertiary-container": "#4d0015",
              "surface-container-high": "#1f1f1f",
              "on-primary": "#420082",
              "inverse-on-surface": "#555555",
              "on-error-container": "#ffb2b9",
              "secondary-fixed-dim": "#00d7f0",
              "on-tertiary-fixed-variant": "#711229",
              "surface-tint": "#c59aff",
              "error": "#ff6e84",
              "tertiary": "#ff8b9a",
              "inverse-primary": "#7e29df",
              "on-surface-variant": "#ababab",
              "on-secondary-fixed": "#003a42",
              "tertiary-fixed-dim": "#fa7c8d",
              "secondary": "#00e3fd",
              "surface-container-lowest": "#000000",
              "background": "#0e0e0e",
              "primary-fixed-dim": "#b075ff",
              "on-surface": "#ffffff",
              "on-primary-container": "#330066",
              "tertiary-container": "#f7798b",
              "tertiary-fixed": "#ff909e",
              "surface-container-highest": "#262626",
              "on-tertiary": "#62041f",
              "on-error": "#490013",
              "on-primary-fixed": "#000000",
              "outline-variant": "#484848",
              "surface": "#0e0e0e",
              "inverse-surface": "#f9f9f9",
              "primary-fixed": "#ba88ff",
              "on-secondary-container": "#e8fbff",
              "error-container": "#a70138",
              "surface-bright": "#2c2c2c",
              "primary-dim": "#9547f7",
              "error-dim": "#d73357",
              "surface-variant": "#262626",
              "surface-container-low": "#131313",
              "primary": "#c59aff",
              "secondary-fixed": "#26e6ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .album-shadow {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5), 0 18px 36px -18px rgba(197, 154, 255, 0.2);
        }
        .text-glow-primary {
            text-shadow: 0 0 15px rgba(197, 154, 255, 0.4);
        }
        .play-glow {
            box-shadow: 0 0 40px rgba(149, 71, 247, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface font-body overflow-hidden">
<!-- Background Layer (Blurred Album Art) -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-surface-dim/80 via-surface-container-lowest/90 to-surface-container-lowest z-10"></div>
<img alt="Blurred background" class="w-full h-full object-cover scale-110 blur-3xl opacity-40" data-alt="abstract vibrant purple and teal neon light reflections on dark water surface in high fidelity 3D render style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTllQVQn3Imb4r7kXDqLrrvu4CAc-KB2yKAA6sdYrCyrtegELRVXxlBCYuo6krHQkG0Y3xK8WT8MHhhGXtZLM_CXS51UB6ERXawn893ZMJkuKLrT0HUBiHBO7NjBgauRH_q53UDFenjMP0M5Gu9U_RkNtoI0DD29S1-IT4arXFqfaFGl0ydvrvUC45T47qgYX1Ve5dwOqomOaxHmzEXwBTupDNFgMUPe7ptQ3iTwcMLUqHv3OV0p4hsArO0CTOAIZ12CtgL1jTkz0"/>
</div>
<!-- Main Player Canvas -->
<main class="relative z-20 h-screen w-full flex flex-col justify-between px-6 md:px-12 py-8 max-w-5xl mx-auto">
<!-- Top Navigation Area (Transactional/Sub-page suppression of Global Nav) -->
<header class="flex justify-between items-center w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel hover:bg-surface-bright transition-colors active:scale-90">
<span class="material-symbols-outlined text-on-surface">expand_more</span>
</button>
<div class="text-center">
<p class="text-[10px] font-label tracking-[0.2em] text-on-surface-variant uppercase">Playing From Playlist</p>
<h2 class="font-headline font-bold text-sm text-primary tracking-tight">Cyber-Vapor Night Drive</h2>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel hover:bg-surface-bright transition-colors active:scale-90">
<span class="material-symbols-outlined text-on-surface">more_vert</span>
</button>
</header>
<!-- Center Piece: Album Art -->
<section class="flex-1 flex flex-col items-center justify-center py-8">
<div class="relative group max-w-[320px] md:max-w-[420px] w-full aspect-square">
<img alt="Neon Pulse" class="w-full h-full object-cover rounded-lg album-shadow" data-alt="futuristic digital art of a neon glowing cube floating in dark space with geometric purple energy lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyDMu0zK9Qzd2asgZehkjpdLBxHCPB-CUc5t6o68aUOJ169KviTOmzZxbVkLogjvcoqOUzdqCN3WDR0JOg7HXzkG2XpZ6mwZwIty-dr2lafvA13ERqFN49fUkK6hvTkVAgzt54JFZF9TtJuvXnNaSQm5ApkriY_glsVx8cImr_YtIicF2TVwRPqIs-B2xOyG2Wo-6y8Z4I1CbIXEdmxEYr9BvirPWOeNY7vw02pcwGYjR7UrdLL-p_PuqzHAmH-NXK1NE8hGH1xmE"/>
<div class="absolute inset-0 rounded-lg bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</section>
<!-- Track Info & Controls -->
<section class="w-full space-y-8 pb-12">
<!-- Metadata & Quick Actions -->
<div class="flex justify-between items-end">
<div class="space-y-1">
<h1 class="font-headline font-extrabold text-3xl md:text-5xl text-on-surface tracking-tighter text-glow-primary">Neon Pulse</h1>
<p class="font-body text-lg md:text-xl text-primary font-medium opacity-90">Viper Core</p>
</div>
<div class="flex gap-4">
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-3xl">playlist_add</span>
</button>
</div>
</div>
<!-- Progress Bar Area -->
<div class="space-y-3">
<div class="relative w-full h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
<!-- Progress Fill -->
<div class="absolute top-0 left-0 h-full w-[45%] bg-gradient-to-r from-primary to-secondary rounded-full relative">
<!-- Playhead -->
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-on-surface rounded-full shadow-[0_0_10px_rgba(255,255,255,0.8)]"></div>
</div>
</div>
<div class="flex justify-between text-[11px] font-label font-medium text-on-surface-variant tracking-wider">
<span>2:14</span>
<span>4:52</span>
</div>
</div>
<!-- Main Playback Controls -->
<div class="flex items-center justify-between max-w-sm mx-auto">
<button class="text-on-surface-variant hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-2xl">shuffle</span>
</button>
<div class="flex items-center gap-8">
<button class="text-on-surface hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">skip_previous</span>
</button>
<button class="w-20 h-20 rounded-full bg-on-surface flex items-center justify-center play-glow hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-surface-container-lowest text-4xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="text-on-surface hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">skip_next</span>
</button>
</div>
<button class="text-primary hover:text-secondary transition-colors active:scale-90">
<span class="material-symbols-outlined text-2xl">repeat</span>
</button>
</div>
<!-- Bottom Row: Device & Download Toggle -->
<footer class="flex justify-between items-center pt-4">
<button class="flex items-center gap-2 px-4 py-2 rounded-full glass-panel text-on-surface-variant hover:text-on-surface transition-all text-xs font-label">
<span class="material-symbols-outlined text-sm">speaker_group</span>
<span>SONIC-STUDIO PRO</span>
</button>
<div class="flex items-center gap-6">
<div class="flex items-center gap-3">
<span class="text-[10px] font-label text-on-surface-variant uppercase tracking-widest">Download</span>
<div class="w-10 h-5 bg-primary/20 rounded-full relative p-0.5 cursor-pointer">
<div class="absolute right-0.5 top-0.5 w-4 h-4 bg-primary rounded-full shadow-sm"></div>
</div>
</div>
<button class="hover:text-primary transition-colors active:scale-90">
<span class="material-symbols-outlined">share</span>
</button>
</div>
</footer>
</section>
</main>
<!-- Visual Polish: Top and Bottom gradients for safe areas -->
<div class="fixed top-0 inset-x-0 h-32 bg-gradient-to-b from-surface-dim/80 to-transparent pointer-events-none z-10"></div>
<div class="fixed bottom-0 inset-x-0 h-32 bg-gradient-to-t from-surface-container-lowest to-transparent pointer-events-none z-10"></div>
</body></html>
